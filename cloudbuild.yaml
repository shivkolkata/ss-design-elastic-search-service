options:
  logging: CLOUD_LOGGING_ONLY

steps:

# Build ElasticSearch Docker image
- name: 'gcr.io/cloud-builders/docker'
  args: [
    'build',
    '-t',
    '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${_VERSION_NO}',
    '.'
  ]

# Push ElasticSearch Docker image to Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  args: [
    'push',
    '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${_VERSION_NO}'
  ]

# Deploy ElasticSearch to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - run
  - deploy
  - '${_IMAGE_NAME}'
  - --image
  - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${_VERSION_NO}'
  - --port
  - '8080'
  - --set-env-vars
  - "http.port=8080"
  - --region
  - '${_REGION}'
  - --platform
  - managed
  - --allow-unauthenticated
  - --timeout
  - '300s'
  - --quiet
  - --memory
  - '4Gi'  # Elasticsearch 8.x needs this much to start reliably
  - --cpu
  - '2'

substitutions:
  _REGION: 'asia-south2'
  _REPOSITORY: 'smiles-and-style-repo'
  _IMAGE_NAME: 'elastic-search-service'
  _PROJECT_ID: 'smiles-and-style'
  _VERSION_NO: '1.0.0'
  _SERVICE_ACCOUNT: 'ss-cloudbuild-sa@smiles-and-style.iam.gserviceaccount.com'